<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio นายจิรชัย</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    background:linear-gradient(135deg,#b8fff5,#9ef7d8,#d8fff8);
    height:100vh;
    overflow:hidden;
}

header{
    text-align:center;
    padding:40px;
    color:#00695c;
}

header h1{
    font-size:48px;
    text-shadow:2px 2px 5px rgba(0,0,0,.2);
}

.menu{
    width:320px;
    margin:auto;
}

.menu a{
    display:block;
    text-decoration:none;
    color:white;
    background:#00b894;
    padding:15px;
    margin:15px 0;
    border-radius:15px;
    text-align:center;
    font-size:20px;
    transition:.3s;
    box-shadow:0 8px 15px rgba(0,0,0,.2);
}

.menu a:hover{
    background:#00997a;
    transform:translateY(-5px) scale(1.05);
}

/* ใบไม้ */
.leaf{
    position:fixed;
    top:-50px;
    font-size:30px;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{
        transform:translateY(-50px) rotate(0deg);
        opacity:1;
    }
    100%{
        transform:translateY(110vh) translateX(100px) rotate(360deg);
        opacity:0;
    }
}
</style>

</head>

<body>

<header>
    <h1>🍃 Portfolio 🍃</h1>
    <h2>นายจิรชัย</h2>
</header>

<div class="menu">
    <a href="profile.html">👤 ประวัติส่วนตัว</a>
    <a href="activity.html">📸 กิจกรรม</a>
    <a href="education.html">🎓 ประวัติการศึกษา</a>
    <a href="contact.html">📞 ช่องทางการติดต่อ</a>
</div>

<script>

function createLeaf(){

    const leaf=document.createElement("div");
    leaf.classList.add("leaf");

    const leaves=["🍃","🍂","🌿"];
    leaf.innerHTML=leaves[Math.floor(Math.random()*leaves.length)];

    leaf.style.left=Math.random()*100+"vw";
    leaf.style.animationDuration=(5+Math.random()*5)+"s";
    leaf.style.fontSize=(20+Math.random()*20)+"px";

    document.body.appendChild(leaf);

    setTimeout(()=>{
        leaf.remove();
    },10000);
}

setInterval(createLeaf,300);

</script>

</body>
</html>
