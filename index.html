<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Portfolio นายจิรชัย</title>

<style>
body{
    margin:0;
    font-family:Tahoma,sans-serif;
    background:linear-gradient(135deg,#b8fff5,#98f5e1,#d9fff8);
    overflow:hidden;
}

h1{
    text-align:center;
    color:#00695c;
    margin-top:40px;
    font-size:45px;
}

.menu{
    width:300px;
    margin:40px auto;
}

.menu a{
    display:block;
    text-decoration:none;
    text-align:center;
    padding:15px;
    margin:15px 0;
    color:white;
    background:#00b894;
    border-radius:15px;
    font-size:20px;
    box-shadow:0 5px 10px rgba(0,0,0,.2);
    transition:.3s;
}

.menu a:hover{
    background:#00997a;
    transform:scale(1.05);
}

.leaf{
    position:fixed;
    top:-50px;
    font-size:30px;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-50px) rotate(0deg);
    }
    to{
        transform:translateY(110vh) translateX(100px) rotate(360deg);
    }
}
</style>

</head>

<body>

<h1>🍃 Portfolio 🍃</h1>

<div class="menu">
    <a href="profile.html">👤 ประวัติส่วนตัว</a>
    <a href="profile.html">📸 กิจกรรม</a>
    <a href="profile.html">🎓 ประวัติการศึกษา</a>
    <a href="profile.html">📞 ช่องทางการติดต่อ</a>
</div>

<script>
function leaf(){
    let l=document.createElement("div");
    l.className="leaf";
    l.innerHTML=["🍃","🍂","🌿"][Math.floor(Math.random()*3)];
    l.style.left=Math.random()*100+"vw";
    l.style.animationDuration=(5+Math.random()*5)+"s";
    l.style.fontSize=(20+Math.random()*20)+"px";
    document.body.appendChild(l);
    setTimeout(()=>l.remove(),10000);
}
setInterval(leaf,300);
</script>

</body>
</html>
